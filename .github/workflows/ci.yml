name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  build:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: filmcam-papi-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios:
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign --debug

      - name: Upload iOS debug build
        uses: actions/upload-artifact@v4
        with:
          name: filmcam-papi-ios-debug
          path: build/ios/iphoneos/*.app

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FilmCam Papi ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: build/app/outputs/flutter-apk/app-release.apk

  release-ios:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-ios, release]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign --release

      - name: Package .app into .ipa
        run: |
          mkdir -p /tmp/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app /tmp/ipa/Payload/
          cd /tmp/ipa && zip -qr filmcam-papi-ios-release.ipa Payload/
          mv filmcam-papi-ios-release.ipa ${{ github.workspace }}/

      - name: Upload iOS IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          files: filmcam-papi-ios-release.ipa
